<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antenna Range Recommender | Signal Registry</title>

  <link rel="stylesheet" href="vendor/Fomantic-UI-2.8.8/dist/semantic.min.css">

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden
    }

    body {
      display: flex;
      flex-direction: column;
    }

    footer {
      margin-top: auto;
    }

    .selected {
      background: lightgreen;
      font-size: larger !important;
    }
  </style>
</head>

<body>

  <div>
    <table class="ui celled structured table unstackable">
      <thead>
        <tr>
          <th rowspan="2" class="center aligned">Frequency</th>
          <th colspan="3" class="center aligned">Antenna Size in Wavelengths (&lambda;)</th>
        </tr>
        <tr>
          <th class="center aligned">Far-field Range</th>
          <th class="center aligned">Near-field Range</th>
          <th class="center aligned">Compact Range</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="left aligned">200 MHz</td>
          <td class="center aligned">
            &lt;2&lambda;
          </td>
          <td class="center aligned">
            &gt;2&lambda;
          </td>
          <td class="center aligned disabled">
            Not ideal
          </td>
        </tr>
        <tr>
          <td class="left aligned">500 MHz</td>
          <td class="center aligned">
            &lt;2&lambda;
          </td>
          <td class="center aligned selected">
            &gt;2&lambda;
          </td>
          <td class="center aligned disabled">
            Not ideal
          </td>
        </tr>
        <tr>
          <td class="left aligned">1 GHz</td>
          <td class="center aligned">
            &lt;5&lambda;
          </td>
          <td class="center aligned">
            &gt;5&lambda;
          </td>
          <td class="center aligned">
            &gt;5&lambda;
          </td>
        </tr>
        <tr>
          <td class="left aligned">2 GHz</td>
          <td class="center aligned">
            &lt;5&lambda;
          </td>
          <td class="center aligned">
            &gt;10&lambda;
          </td>
          <td class="center aligned">
            &gt;10&lambda;
          </td>
        </tr>
        <tr>
          <td class="left aligned">&ge; 4 GHz</td>
          <td class="center aligned">
            &lt;10&lambda;
          </td>
          <td class="center aligned">
            &gt;10&lambda;
          </td>
          <td class="center aligned">
            &gt;10&lambda;
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <footer>
    <div class="ui form">
      <div class="ui fluid icon input">
        <input type="text" placeholder="Search a very wide input...">
        <i class="search icon"></i>
      </div>
    </div>
  </footer>

  <script src="vendor/jquery-3.6.0.min.js"></script>
  <script src="vendor/Fomantic-UI-2.8.8/dist/semantic.min.js"></script>

  <script>
    $(document).ready(() => {
      $('.focus').transition('tada');
    })
  </script>
</body>

</html>
